<!doctype html>
<html lang="en">

<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />

	<!-- SEO PRIMARY -->
	<title>Knights Energy | Solar & EV Charging Solutions</title>
	<meta name="description"
		content="Knights Energy provides solar installation, EV charging infrastructure, and renewable energy solutions in Kenya and East Africa." />
	<meta name="robots" content="index, follow" />
	<meta name="author" content="Knights Energy" />

	<!-- Canonical -->
	<link rel="canonical" href="https://knightsenergy.ke/" />

	<!-- Favicon -->
	<link rel="icon" href="/favicon.ico" />

	<!-- OPEN GRAPH (WhatsApp, LinkedIn, Facebook) -->
	<meta property="og:type" content="website" />
	<meta property="og:title" content="Knights Energy | Clean Energy Solutions" />
	<meta property="og:description"
		content="Solar installation, EV charging infrastructure, and renewable energy solutions in Kenya." />
	<meta property="og:url" content="https://knightsenergy.ke/" />
	<meta property="og:image" content="https://knightsenergy.ke/og/og-image.png" />
	<meta property="og:site_name" content="Knights Energy" />

	<!-- TWITTER CARD -->
	<meta name="twitter:card" content="summary_large_image" />
	<meta name="twitter:title" content="Knights Energy" />
	<meta name="twitter:description" content="Solar and EV charging solutions in Kenya." />
	<meta name="twitter:image" content="https://knightsenergy.ke/og/og-image.png" />

	<!-- PERFORMANCE -->
	<link rel="preconnect" href="https://fonts.googleapis.com" />
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

	<!-- BASE STYLES (keep React root stable) -->
	<style>
		html,
		body {
			height: 100%;
			margin: 0;
		}

		#root {
			height: 100%;
		}
	</style>
</head>

<body>
	<div id="root"></div>
	<script type="module" src="/src/main.tsx"></script>
</body>

</html>
